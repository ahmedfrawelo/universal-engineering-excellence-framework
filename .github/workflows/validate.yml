name: Validate UEEF

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    name: Windows validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Framework validation
        shell: pwsh
        run: ./scripts/validate-framework.ps1
      - name: Capability and spec workflow tests
        shell: pwsh
        run: |
          ./scripts/test-spec-workflow.ps1
          ./scripts/test-capability-health.ps1
          ./scripts/test-capability-profile.ps1
      - name: Quick assurance within budget
        shell: pwsh
        run: ./scripts/measure-assurance.ps1 -Mode Quick -Enforce

  unix:
    name: Unix validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Framework validation
        shell: bash
        run: ./scripts/validate-framework.sh
      - name: Unix assurance
        shell: bash
        run: ./scripts/ueef-audit.sh
      - name: Unix 2.13 workflow tool tests
        shell: bash
        run: |
          sh ./scripts/test-intent-fidelity-contract.sh
          sh ./scripts/test-ueef-task-preflight.sh
          sh ./scripts/test-project-memory.sh
          sh ./scripts/test-evidence-export.sh
          sh ./scripts/test-diff-impact.sh
          sh ./scripts/test-task-budget-advice.sh
